<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name='description' content='{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}'>

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} – {{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.url == "/" %}{{ site.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | strip_html | xml_escape }}{% endif %}">
  <meta name="twitter:image:src" content="{% if page.url == "/" %}{{ site.hero.hero__image | absolute_url }}{% else %}{{ page.image | absolute_url }}{% endif %}">

  <!-- Facebook OpenGraph -->
  <meta property="og:title" content="{% if page.url == "/" %}{{ site.title }} – {{ page.title }}{% else %}{{ page.title }} – {{ site.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.url == "/" %}{{ site.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | strip_html | xml_escape }}{% endif %}" />
  <meta property="og:image" content="{% if page.url == "/" %}{{ site.hero.hero__image | absolute_url }}{% else %}{{ page.image | absolute_url }}{% endif %}" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,400;0,500;0,700;0,900;1,900&display=swap" rel="stylesheet">

  <!-- Ionicons -->
  <link href="https://unpkg.com/ionicons@4.2.2/dist/css/ionicons.min.css" rel="stylesheet">

  <script>
    document.documentElement.setAttribute("dark", "");
    document.documentElement.classList.add('dark-mode');
  </script>

  <style>
  {% capture include_to_scssify %}
  {% include main.scss %}
  {% endcapture %}
  {{ include_to_scssify | scssify }}
  </style>
  {% seo %}

  <!-- Mermaid diagrams -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        fontSize: '18px',
        primaryColor: '#1e2740',
        primaryTextColor: '#f0f0f0',
        lineColor: '#9a9eab',
        actorBorder: '#533feb',
        actorBkg: '#1e2740',
        actorTextColor: '#f0f0f0',
        signalColor: '#f0f0f0',
        signalTextColor: '#f0f0f0'
      },
      sequence: {
        actorFontSize: 16,
        messageFontSize: 15,
        noteFontSize: 14,
        boxMargin: 20,
        width: 180,
        height: 55
      }
    });
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('pre code.language-mermaid, code.language-mermaid').forEach((block, i) => {
        const pre = block.closest('pre') || block;
        const container = document.createElement('div');
        container.className = 'mermaid';
        container.id = 'mermaid-' + i;
        container.textContent = block.textContent;
        pre.replaceWith(container);
      });
      mermaid.run();
    });
  </script>
</head>
